<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-215e482a-8b27-45ff-9c05-f8f456827083" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-8011d81a-1a38-4106-b24a-fe9b5fff70b4" style="color:#666666;background-color:#ffffff;">[san]과 [sanit]은 [건강한]이라는 의미로 사용되는 어원이에요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-2c8535c9-e8dc-4b6a-9bc8-063ece972ada" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-6246a82b-ce8a-4f48-b158-24fdcd93f813" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-a5e1b8d6-6e7f-41f1-a4c7-0ac9f1394786" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-f6d31ea6-ee6b-4a16-b772-70fa63f972b2" style="color:#ff5f45;background-color:#ffffff;">[san]은 정신적인 건강과 관련된 단어에 사용되고 [sanit]은 환경적인 건강 즉, 위생과 관련된 단어에 사용되는 경향이 있어요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-78e6f526-f62f-4f0e-809a-29bcc087ecc4" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-32511880-0f28-4bb6-9148-851734de92d4" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-9ff65c10-2036-41e5-a23d-fdd401976dc6" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-cad49089-630f-40cb-bf74-e96abddf76bf" style="color:#666666;background-color:#ffffff;">이 어원은 대표 단어인 "sane(제정신인, 정신이 온전한)"을 통해서 이해하는 것이 좋아요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-189bf041-8e70-46ee-9fac-1a52f1e87d21" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-025f9c28-ae75-4eea-aa04-aa75bdce4b27" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-52ef7bb3-7e64-4550-90cd-167ef9a37325" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-ee45c9f7-dcc1-4808-b97f-d012bff0a284" style="color:#666666;background-color:#ffffff;">참고로 어원 [san 건강]은 [sanct 신성한 장소] 그리고 [sanguin 피]와 철자적으로는 유사하지만 의미적으로는 관련이 없는 별개의 어원이에요.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-62e7ba4b-8c43-48ad-9cb5-41bdcc96a202" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-34a64bbc-cb33-4b00-ae03-96a11024cd5b" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-eb2c18b9-4b40-4258-8431-39871d6a70af" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-d8806df7-36f7-4a4e-879b-23d750e6b1a0" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-5b18f599-1e49-4fa6-8d96-17ba4664b524" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-5ffd7f81-98e2-4c7b-a76e-f262df6c26da" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-7ed8e2b9-1ad9-487a-893e-885580d2f2e2" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-dba8bca1-88fc-4703-b8b7-52b50f7a34ca" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-b473d0b1-2b26-416e-9212-7f22c73cc5c6" style="line-height:2.0;"><span class="se-fs- se-ff-" id="SE-be2abe8b-d95f-4ac2-9307-37abd1cb948e" style="">​</span></p><!-- } SE-TEXT -->
