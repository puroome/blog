<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-ae5ca0ec-9db4-49d6-b470-8cfac51f24c5" style=""><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-fb41a89e-75e2-4dcd-8041-60e70e20ab7e" style="">[</span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-4e988fcb-d380-4b68-89e9-832f3841cd74" style="color:#0092e6;"><b>text </b></span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-49d1689b-243c-4c72-86b0-eb02fdab2324" style="">짜다, 짜맞추다]</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-9247a372-fbfb-47a3-b027-d2029ea2f00a" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-273794f6-7b41-4ab8-a126-219f82278c51" style="">[</span><span class="se-fs- se-ff-nanumgothic" id="SE-67b801f8-840e-4c80-b746-c24ccce6979d" style="color:#0095e9;"><b>text</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-7711964b-7d22-4458-9d01-620466690a62" style="">]는</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-800096e5-b7f4-4b95-9576-556daa98403c" style=""> [짜다, 짜 맞추다]라는 의미를 가진 어원이에요. 우리가 잘 알고 있는 "</span><span class="se-fs- se-ff-nanumgothic" id="SE-ecaf014a-cfaf-442e-a578-75e03c0bde8c" style="color:#0095e9;"><b>text</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-02420479-39db-4356-9efc-5325e02e7305" style="">"는 "글, 본문, 문자를 보내다"와 같은 뜻으로 쓰이는 단어예요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-675cd4b2-46f5-4654-a2a8-2737a9122889" style=""><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-c907f821-6196-4dc7-831d-f6988ea0f27e" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-b4e1d343-88b3-41b1-b19f-2a3b6f5c0173" style=""><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-72d90c1a-cb2e-4c38-a08e-3ce7a917ceba" style="">"</span><span class="se-fs- se-ff-nanumgothic" id="SE-27227bd7-3ac7-41e5-8ea1-c1a40fee4939" style="color:#0095e9;"><b>text</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-15395da4-8f0f-43ff-b21e-e1b88459d1fc" style="">"라는 단어와 어원[</span><span class="se-fs- se-ff-nanumgothic" id="SE-cd2f3762-650b-442a-a878-00fde131f414" style="color:#0095e9;"><b>text </b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-313616e2-d26c-445b-bc2d-8841e7362b34" style="">짜다, 짜 맞추다]는 언뜻 의미적으로 관련이 없을 것 같지만, 매우 밀접한 관련이 있어요. 왜냐하면 "</span><span class="se-fs- se-ff-nanumgothic" id="SE-f3e6af16-7a65-4014-910b-a1770fe0e199" style="color:#0095e9;"><b>text</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-9265f891-1d9e-42cb-b9c4-51968ebf9360" style="">(글, 본문)"은 언어의 발음기호를 서로 짜 맞춰서[</span><span class="se-fs- se-ff-nanumgothic" id="SE-d8a188b0-719e-48a4-a99a-0adec5d162c7" style="color:#0095e9;"><b>text</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-bde5944c-e7be-4889-8e4f-774f5748be72" style="">] 특정한 의미를 전달하도록 만드는 것을 의미하기 때문이에요.</span></p><!-- } SE-TEXT -->
