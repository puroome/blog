b96-4de9-959c-aa42eaf7a60b" style="color:#0092e6;"><b>corn </b></span><span class="se-fs- se-ff-nanumgothic" id="SE-f863d534-c081-4134-bfb5-2b9d10e116e8" style="">뿔]처럼 뾰족하게 각진 모퉁이를 말하는 거에요.</span></p><!-- } SE-TEXT -->
