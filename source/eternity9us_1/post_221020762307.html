<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-85fe0b93-94aa-430f-a3e5-488ca913fdee" style=""><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-d25e9fab-e746-4e2c-bdb7-97e8367f1bc8" style="">[</span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-d6ef02b0-492c-470e-8708-c0b28d41e8c5" style="color:#0092e6;"><b>jud</b></span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-94d2a2ee-ee67-48d4-9d42-f00372eedf4b" style=""> 판단하다]</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-6cf47694-65dd-4587-9bbb-96dbb324f057" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-baf1966b-bd7d-40da-ac8c-ae3d7e553912" style="">[</span><span class="se-fs- se-ff-nanumgothic" id="SE-839811f3-9b3e-4d6c-ad81-df3e65ca5320" style="color:#0095e9;"><b>jud</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-4d59befa-fc50-4900-a936-e47af1c80834" style="">]는 [</span><span class="se-fs- se-ff-nanumgothic" id="SE-93a34b22-e527-4f38-b9c2-92ad5e32a63a" style=""><b>판단하다</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-fe0e85dd-ad61-4469-8366-75a3a4d1ef40" style="">]라는 의미를 가진 어원이에요. 스포츠 경기에는 판정을 내리는 심판이 필요하겠죠? 그래서 영어에서는 심판을 "</span><span class="se-fs- se-ff-nanumgothic" id="SE-6ad5b296-c24f-41f3-9d97-afb082d266a6" style="color:#0095e9;">​</span><span class="se-fs- se-ff-nanumgothic" id="SE-ad290a97-7595-476a-8619-ccc10e5dec9c" style="color:#0095e9;"><b>jud</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-71f79274-325a-4ecb-8647-31ae1d188c04" style=""><b>ge</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-43632ae1-5d15-40e0-bd3b-61797655a73c" style="">"라고 불러요. 이 단어는 당연히 [</span><span class="se-fs- se-ff-nanumgothic" id="SE-9554ad44-84cf-4bb2-86a8-9b0176953435" style="color:#0092e6;"><b>jud </b></span><span class="se-fs- se-ff-nanumgothic" id="SE-33e9c3cb-8dca-4a3c-ba78-76778eeb6327" style="">판단하다]라는 어원에서 만들어져요.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-ef5d5c63-aeac-4c09-ad1a-71a4437bfa19" style=""><span class="se-fs- se-ff-" id="SE-30a982ba-d94a-482c-b004-1334cabe8412" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-c47daa16-6f11-4423-b18e-6ff208b9a55c" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-fef84716-8288-4424-96a2-a5bd1e133769" style="">영화 중에는 미래 사회의 심판자 - 저지(</span><span class="se-fs- se-ff-nanumgothic" id="SE-628d403a-2396-441b-9f71-b78d5f8abcd3" style=""><b>judge</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-9e5877b6-4be5-4d74-b240-9f56f6650c1c" style="">) 드레드 라는 영화가 있어요. "</span><span class="se-fs- se-ff-nanumgothic" id="SE-26b02c6c-417e-4571-abed-e215a5ff14f5" style="color:#0095e9;"><b>jud</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-f5f7757a-73c2-4a95-9130-5b55d700f4b9" style="">ge"는 "심판, 재판관, 판결하다"와 같은 뜻으로 쓰여요.</span></p><!-- } SE-TEXT -->
