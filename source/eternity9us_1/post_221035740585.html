<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-90028a02-364e-43de-ae6f-fedc9a9537d9" style=""><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-09663182-7038-4dff-b9ae-ce9761be1675" style="">[</span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-22ea5b20-3c69-43a5-994d-abb91858c983" style="color:#0092e6;"><b>photo </b></span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-2b69b899-9fc4-457e-b084-ced900424c4f" style="">빛]</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-7d0b686f-e9b7-41db-93ac-9680755988c3" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-5e156e73-4187-4624-b26b-d6a221fb62d2" style="">[</span><span class="se-fs- se-ff-nanumgothic" id="SE-f674b56b-8bd4-44df-9a16-eb628eab5ee9" style="color:#0095e9;"><b>photo</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-9e4a4ad0-5fa2-45f3-b744-e0a728317eb2" style="">]는 [</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-a1b945b7-8769-4f26-babf-efdee9883566" style="">빛</span><span class="se-fs- se-ff-nanumgothic" id="SE-7b370f2a-ab8f-4d0e-a23b-1f961a589213" style="">]이라는 의미를 가진 어원이에요. 우리가 잘 알고 있는 단어 사진(photo)는 원래 "</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-efe1ad92-c6c3-4fe4-af4f-90fa3f3221ab" style="">포토그래프(</span><span class="se-fs- se-ff-nanumgothic" id="SE-18d49959-f18d-439a-a6ec-f837325ea241" style="color:#0095e9;"><b>photo</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-14450452-7c57-44bc-8ad7-105c7a6987e0" style="">graph)</span><span class="se-fs- se-ff-nanumgothic" id="SE-ed16ff90-7d1b-4585-9992-c46da9fc5d08" style="">"를 줄여서 부르는 말이에요. 사진을 찍을 때 빛[</span><span class="se-fs- se-ff-nanumgothic" id="SE-164c39da-d394-4089-84cf-438e6e6408fc" style="color:#0092e6;"><b>photo</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-ea95121e-76c3-4594-adba-56d9912e2076" style="">]이 없다면 당연히 아무것도 찍히지 않겠죠? </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-c545b6af-d8f6-4de8-a888-60b708c813ab" style=""><span class="se-fs- se-ff-" id="SE-52c4e1e9-d2d8-4034-bfc8-8e5a08b8d42c" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-4438a737-7fc7-4f68-a91a-6900fc991b2d" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-cbca02cd-f98e-422b-9ee5-2d7ffc2207ae" style="color:#00a350;"><b>사진(photograph) :-</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-014cd726-5819-464d-a45a-ba228f0b4425" style="">사진은 물체에 반사되는 빛[</span><span class="se-fs- se-ff-nanumgothic" id="SE-0d879dd5-abff-47b5-8997-f514b6b71d49" style="color:#0092e6;"><b>photo</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-ec1442a5-e6f8-486d-82b9-edd3204e048b" style="">]을 받아들여서 이미지를 만들어내요. 그렇기 때문에 사진은 빛[</span><span class="se-fs- se-ff-nanumgothic" id="SE-78dcde61-8b83-4386-b033-47b3348d77d8" style="color:#0092e6;"><b>photo</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-3e8ae2f5-97ca-4c00-bf88-e5b9011ed43b" style="">]으로 그린 그림[graph]라고 할 수 있어요.</span></p><!-- } SE-TEXT -->
