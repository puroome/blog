<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-6e38217d-e0ab-4d14-899b-12985a3156bd" style=""><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-5af28bd4-9efe-4639-b591-6eb86f46db81" style="">[</span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-1a756b6d-9fcf-499b-80d9-4991e6df6fde" style="color:#0092e6;"><b>will </b></span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-b148738c-6d54-4f87-a679-6a70757ea9d9" style="">의지]</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-3d9d15db-55cc-4725-a6b3-c89c9ac28fd5" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-4460c689-98a8-4703-b4ee-4c6f5cc1e8c4" style="">[</span><span class="se-fs- se-ff-nanumgothic" id="SE-509b5b92-c59c-45da-b645-9302e4909188" style="color:#0095e9;"><b>will</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-e7756cad-164c-46dd-aa5c-da6f2a4f9c27" style="">]은 [</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-0673d1f6-5652-4a5d-b119-f0c37827b677" style="">의지]라는 의미를 가진 어원이에요. 여러분은 "~할 것이다"라는 미래를 나타내주는 "</span><span class="se-fs- se-ff-nanumgothic" id="SE-fc709f87-7b99-4444-9048-cf8133410488" style="color:#0095e9;"><b>will</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-4a171951-4e71-49d3-955d-47b29a3d379f" style="">"을 잘 알고 있을 거예요. 사실 이 의미는 [의지]라는 의미에서 나오는 것이에요. 내가 의지[</span><span class="se-fs- se-ff-nanumgothic" id="SE-61c2c01e-4adf-4235-981b-851bfbcb8bf4" style="color:#0095e9;"><b>will</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-20008ae6-b59f-461d-93e3-33d575d3e24c" style="">]를 가지고 있다는 것은 당연히 "앞으로 ~할 것이다(</span><span class="se-fs- se-ff-nanumgothic" id="SE-3a284803-3bd2-43ed-baa2-d0568285a026" style="color:#0095e9;"><b>will</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-71061cb0-33e2-4192-a4d9-dddfca7e1891" style="">)"라는 의미가 되겠죠?</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-f27dfd95-6042-437c-a6c1-f33d68cfe16b" style=""><span class="se-fs- se-ff- se-weight-unset" id="SE-2bcc2a17-dc87-45ab-901e-1726c110e0f5" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-fbe769a1-0063-4580-a0a1-5fa691e2d536" style=""><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-3d4c1d44-296b-4867-86c6-9000e4730074" style="">그래서 "</span><span class="se-fs- se-ff-nanumgothic" id="SE-cad171d7-9e71-434d-9bfa-6ab9c9953cb2" style="color:#0095e9;"><b>will</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-44997973-3d9c-49aa-a87e-4cf9e56e4e0e" style="">"의 뜻은 "의지, ~할 것이다"처럼 사용이 돼요. 참고로 유언은 "last </span><span class="se-fs- se-ff-nanumgothic" id="SE-938c07df-e1f6-4e9c-8209-cc2a4c8a7fe5" style="color:#0095e9;"><b>will</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-8cde26c8-fdb6-4f44-8ffe-f5c02aee92fd" style="color:#0092e6;"> </span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-a14ebcd0-58d9-4ced-8cca-479a5d982c32" style="">and testament"라고 표현을 해요.</span></p><!-- } SE-TEXT -->
