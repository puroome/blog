ic" id="SE-f80f0fe3-df7e-4c45-969c-c5ac4841228f" style="color:#0095e9;"><b>tect</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-73d100de-95ba-4301-acd0-12ea994f9f33" style="">] 것을 반대로 들춰내는 것이 바로 "발견하다, 간파하다"라는 뜻이겠죠? 그래서 [de 반대] + [</span><span class="se-fs- se-ff-nanumgothic" id="SE-93470e9f-d7f9-4361-93eb-577ce1516f0b" style="color:#0095e9;"><b>tect</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-196a51c0-5b55-4438-8279-2ea63baa6634" style="color:#0092e6;"> </span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-7e70075a-55a9-4f83-9b6b-5a3f2829d24e" style="">덮다]로 만들어지는 단어가 "de</span><span class="se-fs- se-ff-nanumgothic" id="SE-e25c83c4-827b-4f37-8a2a-4ec3d3edea23" style="color:#0095e9;"><b>tect</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-f37ae5c5-579a-48cd-8576-bd5d7ff6069b" style="">"예요.</span></p><!-- } SE-TEXT -->
