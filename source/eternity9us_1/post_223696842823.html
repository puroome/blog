<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-1342d893-87a0-482f-be92-9818cb0ca584" style="line-height:2.0;"><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-250b6908-7b2a-44fc-b947-c9ba162bbfec" style="color:#666666;background-color:#ffffff;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-ea10ff2f-5dd0-4f2a-b1af-b3c6e5231cfa" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-c4f7f77c-e55b-4b0b-9768-b69a4c7e7af2" style="color:#666666;background-color:#ffffff;">[mater]은 [어머니, 근원]이라는 의미로 사용되는 어원이에요. [어머니]는 생명의 근원이기 때문에 [mater]은 [근원]이라는 의미로도 확장해서 이해해야 해요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-e6039ce3-b0c9-49a5-8500-11f9d739fccb" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-4f8cd785-8e79-4f55-b797-b856793a6d29" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-1613d39e-2333-4cda-80a9-5c65e9938980" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-85ffe0be-fc6c-4e9c-9093-41b6cc6ee107" style="color:#666666;background-color:#ffffff;">"mother"도 이 어원에서 철자가 변화돼서 만들어진 단어이기 때문에 어원 자체는 쉽게 이해할 수 있어요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-16fa7c37-52b7-46cc-9e3a-1e9f9b204b37" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-2bc46da6-9a12-4c81-ba27-a507cfa14176" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-4db26a78-51eb-4c48-8187-cd668994497b" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-6c7c39b8-2978-43af-baaa-64be0ad15789" style="color:#666666;background-color:#ffffff;">참고로 변화 형태인 [meter]는 [meter 측정하다]와 철자상으로 똑같기 때문에 혼동하지 않도록 주의해야 해요.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-40a1c193-1044-4bf2-bd05-cade44ee6224" style="line-height:2.0;"><span class="se-fs- se-ff-" id="SE-f9c1dcb5-9f83-43ef-9788-f729741cfe96" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-ec082e46-f044-4b0d-a750-6519524a8120" style="line-height:2.0;"><span class="se-fs- se-ff-" id="SE-9bd96ad9-8096-4e6b-ae80-f6e457e240a4" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-74c29a68-b298-4e41-90d9-1f1aa7163e5d" style="line-height:2.0;"><span class="se-fs- se-ff-" id="SE-97c63571-27ae-4535-9e4f-587c2bf5e980" style="">​</span></p><!-- } SE-TEXT -->
