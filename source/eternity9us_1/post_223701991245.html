<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-8dbea0d5-7c84-4164-85f7-aaccbdd97e3e" style="line-height:2.0;"><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-48a9f6fc-6989-4f2d-948b-f4c4b56b5e70" style="color:#666666;background-color:#ffffff;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-95b5e802-ba52-4cb7-9f12-162e13d11196" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-03130ad8-0012-485a-874a-1720184fd61e" style="color:#666666;background-color:#ffffff;">[stan]은 [서다, 세우다]라는 의미로 사용되는 어원인데 기본적인 단어인 "stand(서다, 세우다,...)"를 떠올려보면 알 수 있어요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-80b17985-c2f1-47fc-bee8-e47887b68498" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-0f264c80-dab0-4000-9cf5-7aa1062787a6" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-868b5c0b-5612-46c1-81d5-081a1c43bf3e" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-7bbb85b8-7818-418a-b5ae-b5df02bc298f" style="color:#666666;background-color:#ffffff;">어원의 변화 형태가 많아서 복잡해 보이지만 모두 기본적인 변화에 해당돼요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-2d49d074-0ea0-4ec1-b50a-efad9e20a7d1" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-2ae10578-a194-44ea-837b-82b15649c7f6" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-42d9cfd7-3e4e-4023-95a0-e4bd6de43a77" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-402370dc-d7b4-4a74-ba26-cbee34931c07" style="color:#666666;background-color:#ffffff;">참고로 이 어원의 근본적인 형태는 [sta-]라고 할 수 있는데 철자의 변화 형태를 쉽게 정리하기 위해서 위와 같이 분류해 놓았어요. </span></p><!-- } SE-TEXT -->
