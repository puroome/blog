a-8e7c-17dcc2866327" style=""> shock ab</span><span class="se-fs- se-ff-nanumgothic" id="SE-71f6b48a-d710-4113-b7e8-6c2d1e276753" style="color:#0095e9;"><b>sorb</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-fa4a7aa2-18e8-45e1-841d-6b6dac42bd4c" style="">er(쇼크 업쇼버)라고 부르는데, 충격에서 멀어지도록 충돌에 의한 충격을 빨아들이듯이[</span><span class="se-fs- se-ff-nanumgothic" id="SE-39474aee-4969-4922-9f1a-d1cf5c33d306" style="color:#0095e9;"><b>sorb</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-20827388-8da8-45cb-8107-aab0d4496514" style="">] 없애주는 역할을 해요. </span></p><!-- } SE-TEXT -->
