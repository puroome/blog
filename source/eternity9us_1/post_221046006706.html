<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-88dbd1ea-3174-4aa1-86a4-57098ba8a187" style=""><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-fade7ba8-4aff-46c1-93de-eb42e0704a52" style="">[</span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-6f8b3238-0117-42f4-b1da-eaae4255a312" style="color:#0092e6;"><b>soph </b></span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-db846c3b-029e-4ad8-b5f8-706a548e8286" style="">지성, 세련]</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-80f7e71b-7faa-4c64-b545-61cac9b74cde" style=""><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-04c94393-2dae-434d-ab2e-ff00e78b1100" style="">[</span><span class="se-fs- se-ff-nanumgothic" id="SE-93e3eaf9-c8a8-4a70-9bc6-4c01f8b4526a" style="color:#0095e9;"><b>soph</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-2d288d5d-82a3-4b39-9388-4d53290144d6" style="">]은 [지성, 세련]이라는 의미를 가진 어원이에요. 여러분들은 여성의 이름에서 소피아(</span><span class="se-fs- se-ff-nanumgothic" id="SE-c65231db-5af9-48c0-b105-6619fae188cb" style="color:#0095e9;"><b>Soph</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-ded08cb8-395d-4df3-8d80-960bd3187389" style="">ia) 또는 소피(</span><span class="se-fs- se-ff-nanumgothic" id="SE-6fe5ae69-f549-4c1e-bd08-1bebaf80447f" style="color:#0095e9;"><b>Soph</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-94c64ab1-d4b9-474c-80f4-db04f790e1dd" style="">ie)와 같은 이름을 들어본 적있나요? </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-1ed4e2f3-b3c1-4457-8e4b-85680109b0f3" style=""><span class="se-fs- se-ff- se-weight-unset" id="SE-fdca0f22-975a-4cd0-afeb-997006dab041" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-80c79f17-921f-45c8-aad0-45e3d885779f" style=""><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-fff7dda6-495b-4352-a6a7-cb34d97279d3" style="">여성의 이름에 많이 사용되는 소피아(</span><span class="se-fs- se-ff-nanumgothic" id="SE-f0acc4a8-1ba5-4133-8140-b4b1943c6b50" style="color:#0095e9;"><b>Soph</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-96f257fa-ec57-483e-b29c-b7ed1d32cdc8" style="">ia)는 [</span><span class="se-fs- se-ff-nanumgothic" id="SE-f7024dba-9445-443c-abc9-463176cc4a19" style="color:#0095e9;"><b>soph</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-5db047cd-8373-447f-8190-b2e70d3337bd" style="color:#0092e6;"> </span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-2eb30ba9-5eb3-4fa8-869a-c52ce4f45c11" style="">지성, 세련]이라는 어원에서 나온 이름이에요. 자신의 딸이 지성과 세련미[</span><span class="se-fs- se-ff-nanumgothic" id="SE-8c2b0654-55ae-40be-a18f-344204b43089" style="color:#0095e9;"><b>soph</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-fe0167bf-b7b0-456f-bc71-31e65c19ab54" style="">]를 갖추길 바라는 마음에서 소피아(</span><span class="se-fs- se-ff-nanumgothic" id="SE-fa491f03-5b40-4743-aaf0-2cc29ac46da8" style="color:#0092e6;"><b>Soph</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-68879ff0-71a2-4b19-a4c3-576721b1e0c7" style=""><b>​</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-1a38edc9-4add-4a27-8e15-81b385c3fb6a" style="">ia)라고 지어준 것이겠죠?</span></p><!-- } SE-TEXT -->
