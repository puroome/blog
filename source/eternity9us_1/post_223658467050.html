<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-5a8724cf-5dc2-4b8a-bb0d-950f9add7e92" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-1f53d9ce-29e0-4c03-8384-bbd7bf4cf4fb" style="color:#666666;background-color:#ffffff;">어원 [leg]는 [법, 읽다, 모으다] 세 가지 의미로 사용되는 어원이에요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-d443b174-982c-4264-b1a7-27846d75a3ce" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-8179e09a-dc30-4612-b1b4-3608d52b757b" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-e6313a5a-e89e-4f77-b202-55dee6f7743f" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-a2a86e36-aa38-4972-b344-ab01f0ee7eb5" style="color:#666666;background-color:#ffffff;">기본적인 의미는 [모으다]인데 사회에 필요한 규범들을 모아 놓은 것이 법이 되고 이런 법은 모든 사람들이 읽을 수 있도록 글로 기록되었기 때문에 [법] [읽다]라는 의미로도 확장된 것으로 판단돼요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-a78a4cbe-da2c-46d9-a8bd-92576dd95c91" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-5ff64590-1d12-4b40-9f3d-a72ec09ccec9" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-2220060d-7f0d-44d9-9710-5f381cb65069" style="line-height:2.0;"><span class="se-fs- se-ff- se-style-unset" id="SE-d2471e41-576a-4b0d-acfc-26369551d3bf" style="color:#666666;background-color:#ffffff;">참고로 변화 형태인 [</span><span class="se-fs- se-ff- se-style-unset" id="SE-a3255afd-f22c-42df-819d-342240e4875b" style="color:#0095e9;background-color:#ffffff;"><b>lig</b></span><span class="se-fs- se-ff- se-style-unset" id="SE-6e0b4e76-af86-41d7-8d70-ac28574a332d" style="color:#666666;background-color:#ffffff;">]와 [</span><span class="se-fs- se-ff- se-style-unset" id="SE-0680dca9-28fa-4da8-a06b-a682d562d680" style="color:#0095e9;background-color:#ffffff;"><b>lect</b></span><span class="se-fs- se-ff- se-style-unset" id="SE-978ab24b-8f9f-4127-a7e0-72a9d1e4bc29" style="color:#666666;background-color:#ffffff;">]는 대부분의 경우에 [모으다]라는 의미로 사용된다고 이해해 두는 것이 좋아요.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-8f9e32e2-cf88-499e-8ec4-4b2ed1f052e6" style="line-height:2.0;"><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-a41e7db1-4a09-469e-9fe5-447c729b177a" style="color:#666666;background-color:#ffffff;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-ae1623ec-9f7a-451c-920c-38c71cb31412" style="line-height:2.0;"><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-1da26354-9652-4fed-900c-88ca7b11aa30" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-d21397b8-ab34-41a9-a190-8283d06c7756" style="line-height:2.0;"><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-ffbcb22a-135b-48b3-9b9f-44d5dba30a45" style="color:#666666;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-7a971a62-600e-4250-bf6b-0679a8e86587" style="line-height:2.0;"><span class="se-fs- se-ff-" id="SE-a98bcf23-30b6-4239-8359-3160af36eb6b" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-46ef04d9-447d-4889-a0e9-3ea11268792d" style="line-height:2.0;"><span class="se-fs- se-ff-" id="SE-766a4cd4-aa65-4aae-b834-14796246f458" style="">​</span></p><!-- } SE-TEXT -->
