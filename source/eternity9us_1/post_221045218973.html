<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-3d060eab-a647-42d8-b167-f6c17d536dfb" style=""><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-247fb9bc-5f30-4b8d-a8eb-03b08a57294f" style="">[</span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-793e48ce-a78a-4319-8d03-21227813a1ef" style="color:#0092e6;"><b>sign </b></span><span class="se-fs-fs28 se-ff-nanumgothic" id="SE-97ed2265-b4e5-4db0-bb31-af8adf41ea64" style="">표시]</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-19372432-8953-4994-8010-3626c67f5baa" style=""><span class="se-fs- se-ff-nanumgothic" id="SE-3f25c5ab-157d-4474-887d-e193988c910c" style="">[</span><span class="se-fs- se-ff-nanumgothic" id="SE-55b4e9c6-4054-4cd2-b7a9-7bf037f3ef5f" style="color:#0095e9;"><b>sign</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-9666f140-b4bc-43f2-9a79-60f7c506ee01" style="">]은 [</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-13aeeb77-4efa-4229-acd3-b0df061032d5" style="">표시</span><span class="se-fs- se-ff-nanumgothic" id="SE-860e606c-72df-4a6d-9cee-da9c2ba739bc" style="">]라는 의미를 가진 어원이에요. 여러분들은 "옷의 디자인, 제품 디자인, 자동차 디자인 등등과 같이 "</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-1bafedd6-6a63-4929-8735-db6297212ab3" style="">디자인(de</span><span class="se-fs- se-ff-nanumgothic" id="SE-a039eb1e-18bb-4074-a144-c3f69b8e7d94" style="color:#0095e9;"><b>sign</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-ee4c7fdd-90dd-49ef-8d08-94dc209aad9d" style="">)</span><span class="se-fs- se-ff-nanumgothic" id="SE-496b763b-60c0-4da9-aa71-44d1b9d5b06d" style="">"이라는 용어를 한국어처럼 많이 사용</span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-050590a4-bf21-41ca-995f-5fc991689a69" style="">할 거예요. </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-c39b8eb7-4737-4b04-bfe7-1ee7b6172dd4" style=""><span class="se-fs- se-ff- se-weight-unset" id="SE-730bd859-e354-4bb0-9d01-505e91c2557e" style="">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-left" id="SE-de23a733-ff75-45d9-b44c-b9b670b1a3ee" style=""><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-5f678028-024a-4f98-87fa-c51e54fe0df2" style="">"디자인(de</span><span class="se-fs- se-ff-nanumgothic" id="SE-0ce50c0a-b047-472d-8110-0934d31fcf6c" style="color:#0095e9;"><b>sign</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-85c5854b-fe59-47f2-98f4-13706cdc3e47" style="">)"이라는 것은 제품을 어떻게 만들어야 하는지 확실히, 완전하게 알 수 있도록[de] 표시[</span><span class="se-fs- se-ff-nanumgothic" id="SE-9fa18590-20f3-4a37-b373-b8f33d0fe080" style="color:#0095e9;"><b>sign</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-04090770-c700-4113-b8ac-20c006f5d63d" style="">]를 해서 제품을 만드는 방법을 알려주는 것을 말해요. 그래서 "de</span><span class="se-fs- se-ff-nanumgothic" id="SE-875044b0-f422-4721-ba5d-3b0c98fa78c0" style="color:#0095e9;"><b>sign</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-b500bc9f-718b-4583-aed3-6cdd2f719243" style="">"은 "설계, 도안, 설계하다"라는 뜻이 돼요.</span></p><!-- } SE-TEXT -->
