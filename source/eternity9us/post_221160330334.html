<p class="se_textarea"><!-- SE3-TEXT { --><span class="se_fs_T1" style="color: rgb(0, 146, 230);"><b>stroke</b></span><span><br/></span><span>뜻 : </span><span><b>일격, 타격, 발작 </b></span><span>(명사)<br/></span><span>발음 : <em class="txt_nation" style=" color: rgb(0, 0, 0)"><span class="txt_pronounce"></span></em></span><span><b>[s 스 t 트 rou 로우 k 크]</b></span><span><em class="txt_nation" style=" color: rgb(0, 0, 0)"><span class="txt_pronounce"></span></em><br/></span><span><br/></span><span><br/></span><span>"</span><span style="color: rgb(0, 146, 230);"><b>stroke</b></span><span>"은 한번 "탁"하고 때리듯이 치는 행동으로 "</span><span><b>일격, 타격</b></span><span>"을 말해요. 예를 들어서 드럼연주에 있어서 드럼을 치는 행동을 스트록(<b style=" color: rgb(0, 146, 230)">stroke</b>)이라고 해요. 또한 신체적으로 탁! 치듯이 충격이 오는 "</span><span><b>발작</b></span><span>"이라는 뜻도 돼요. 그렇기 때문에 "</span><span><b>heat <b style=" color: rgb(0, 146, 230)">stroke</b></b></span><span>"은 "</span><span><b>일사병</b></span><span>"이라는 의미가 되고 "</span><span><b>heart <b style=" color: rgb(0, 146, 230)">stroke</b></b></span><span>"은 "</span><span><b>심장발작</b></span><span>"이라는 뜻이에요.</span><span></span><!-- } SE3-TEXT --></p>
