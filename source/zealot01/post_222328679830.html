<!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-b8d8df91-fa43-495f-97b8-997ec0eec2fd" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-0727e25f-7d15-4414-bff5-39509b8ae8b5" style="color:#000000;">공부를 잘 하려면, 큰 일을 하려면 잠을 잘 자야 합니다.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-a89d8af9-e120-4d7b-a4ca-8c917c187660" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-5c9dee12-bddf-48ce-aa94-c046ab7a36f6" style="color:#000000;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-1f6e70ac-cbdb-4129-8dec-69315e417c80" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-6a52131b-75a5-4ac2-9828-1fd22d329a69" style="color:#000000;">여러분들이 미래에 큰 일을 이루어내려면 </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-862a0760-4e4c-4dc7-83e0-e425ac80e5d7" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-c1bce89c-ec20-4f97-b0c6-a6898d6cf4ac" style="color:#000000;">올바른 정보와 지식, 집중과 몰입, 수면과 명상이 핵심 키워드입니다.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-7b634ff2-ae79-4c47-b58d-9d49affee11e" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-9750d8de-26d2-497e-b063-8d9eab1e6503" style="color:#000000;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-88c07444-9a6b-4503-b0ec-a91e73f5f785" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-3f19df79-7923-4db2-bdf1-b50394a31e45" style="color:#000000;">잡다한 생각이 집중과 몰입을 방해하지 않도록 제거하려면 </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-e621a252-afaa-4ff4-83ee-c434d33e2a1e" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-c06f04cd-46a0-495c-a6d3-7a7b12951b67" style="color:#000000;">다시 말해, 생각의 간섭 현상을 제거하려면 머리가 맑아야 합니다.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-f8d4b8ef-8efd-4fa0-adb0-d898376d524b" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-32064dac-c612-4ffb-aa1f-f165cab17210" style="color:#000000;">머리가 맑아지려면 충분한 수면을 취해야 하고 </span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-912775e5-02b3-412f-b722-049ecd504874" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-fcaf9560-23b4-4fe8-a6ac-7fe1f8a38689" style="color:#000000;">명상을 통해서 생각을 맑게 만들어야 합니다.</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-e4e34a40-4623-4beb-ba27-4bc84db17791" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-8bdb7e07-00b2-4342-89b9-f5c40cd6f542" style="color:#000000;">​</span></p><!-- } SE-TEXT --><!-- SE-TEXT { --><p class="se-text-paragraph se-text-paragraph-align-" id="SE-5e19e4ec-fd7e-483a-8fcc-6a8b600cb6ed" style="line-height:2.4;"><span class="se-fs-fs19 se-ff-system se-weight-unset se-style-unset" id="SE-034a9963-80af-41bb-a53d-bdaf1ec76b6d" style="color:#000000;">머리가 맑아져야 집중과 몰입하는데 수월합니다.</span></p><!-- } SE-TEXT -->
