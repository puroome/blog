fffff;">사막에는 모래로 만들어진 언덕이 있죠? 이러한 언덕을 우리말로는 "사구"라고 하고 영어로는 "</span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-6a87883c-8cf1-45a2-a1d6-7fa70a420ead" style="color:#0095e9;background-color:#ffffff;"><b>dune</b></span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-bb7b7078-b448-4855-bd49-97d7f1c4a9db" style="color:#000000;background-color:#ffffff;">"이라고 해요. 이러한 "</span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-64887a4a-419e-43f7-a823-395bbd31bfc4" style="color:#0095e9;background-color:#ffffff;"><b>dune</b></span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-ef877e65-0714-4fb5-b686-bde2f2cf1059" style="color:#000000;background-color:#ffffff;">"은 바람이 모래 알갱이를 하나 하나 가져다 둔(</span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-554e4845-db60-4419-bd3a-d385329ad90a" style="color:#0095e9;background-color:#ffffff;"><b>dune</b></span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-2ae22626-4676-4e7c-b13b-9beb6cea4943" style="color:#000000;background-color:#ffffff;">) 덕분에 만들어진 거에요. 저는 이 단어를 이렇게 생각하면서 기억해뒀어요.</span></p><!-- } SE-TEXT --></div>
