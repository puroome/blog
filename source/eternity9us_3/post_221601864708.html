d-color:#ffffff;">"</span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-ebafe985-e61e-4167-b619-fec28b965e73" style="color:#0095e9;background-color:#ffffff;"><b>soar</b></span><span class="se-fs-fs15 se-ff- se-style-unset" id="SE-fadb6d56-7d5f-4bdc-ae8c-18bcf9305926" style="color:#000000;background-color:#ffffff;">"는 새들이 바람을 타고 하늘 높이 날아 오르는 것과 같은 모습을 나타내는 단어에요. 그래프에서 기울기가 갑자기 올라가면 마치 높이 날아 오르는 모습과 같다고 할 수 있겠죠? 그래서 가격이나 판매량이 갑작스럽게 많아지는 것을 묘사할 수도 있어서 "치솟다, 급등하다"라는 뜻으로도 사용될 수 있어요.</span></p><!-- } SE-TEXT --></div>
