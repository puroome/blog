"SE-1e51b4c2-001e-4ad6-978a-eba3af9ccfbd" style="">여러분들은 집에서 </span><span class="se-fs- se-ff-nanumgothic" id="SE-6ef179ed-c32c-46a7-94a8-4ccf91a434c9" style=""><b>폼 클린저</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-98e25a6a-f61f-47de-8e71-b3a83cbd84d6" style="">(</span><span class="se-fs- se-ff-nanumgothic" id="SE-5dcf627b-9b29-47c6-9a34-c25f01f9fc98" style="color:#0092e6;"><b>foam </b></span><span class="se-fs- se-ff-nanumgothic" id="SE-eebaebb7-d19a-4013-acf6-ad9ad6e8b2df" style=""><b>cleanser</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-78ef1ce2-b9ea-49b1-a0fd-8cdc7e9fa01e" style="">)를 써 본적 있나요? 누르면 </span><span class="se-fs- se-ff-nanumgothic" id="SE-1118766a-e255-4fcc-86bf-04ec61d0bccc" style=""><b>거품</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-4f65d4bd-ffda-40a0-987d-8ee60c70df82" style="">(</span><span class="se-fs- se-ff-nanumgothic" id="SE-22ac5965-726e-4066-a08c-432a6aa3d477" style="color:#0092e6;"><b>foam</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-085ed057-ea84-4bd3-9ce6-5d7274c053bd" style="">)이 나오는 세안 용품이에요. 또한 우리가 포장을 위해서 사용하는 </span><span class="se-fs- se-ff-nanumgothic" id="SE-6c0a40f4-1457-4dde-800a-ac9523d806e1" style=""><b>스티로폼</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-c2b6f40d-21b1-4f61-8965-c9ebf004fb6b" style="">(</span><span class="se-fs- se-ff-nanumgothic" id="SE-50478c2e-b287-486c-89d8-fee8b13e0140" style=""><b>styro</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-0fc4470f-a585-4f29-b282-b6e28b2f9810" style="color:#0092e6;"><b>foam</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-78df522f-caf5-4abe-abc6-e2e27db5ad83" style="">)도 거품모양의 플라스틱이기 때문에 스티로폼이라고 불려요.</span></p><!-- } SE-TEXT -->
