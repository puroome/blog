<blockquote class="se2_quote7" style="_zoom:1;margin:0 0 30px 0;padding:10px;border:1px solid #66b246;color:#888888;">
<p align="center" style="TEXT-ALIGN: center"><span style="COLOR: #000000"><strong>If you have a sick or lonely person at home, be there. </strong></span></p>
<p align="center" style="TEXT-ALIGN: center"><span style="COLOR: #000000"><strong>Maybe just to hold a hand, maybe just to give a smile, </strong></span></p>
<p align="center" style="TEXT-ALIGN: center"><span style="COLOR: #000000"><strong>that is the greatest, the most beautiful work. </strong></span></p>
<p align="center" style="TEXT-ALIGN: center">여러분 집에 아프거나 외로운 사람이 있다면, 거기에 여러분도 계세요. </p>
<p align="center" style="TEXT-ALIGN: center">단지 손을 잡아 주거나, 단지 미소를 줄 수 있도록. 이것이 가장 위대하고 가장 아름다운 일이 아닌지요." </p>
<p align="center" style="TEXT-ALIGN: center">- Mother Teresa 테레사 수녀 </p></blockquote>
