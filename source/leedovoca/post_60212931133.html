<div class="view" style="font-size:12pt; font-family:'3287760_12';"><div class="view" style="font-size:12pt; font-family:'3287760_12';"><blockquote class="se2_quote5" style="_zoom:1;margin:0 0 30px 0;padding:10px;border:1px dashed #cccccc;background:url(https://ssl.pstatic.net/static.se2/static/img/bg_b1.png) repeat;_background:none;_filter:progid:DXImageTransform.Microsoft.AlphaImageLoader(src='https://ssl.pstatic.net/static.se2/static/img/bg_b1.png',sizingMethod='scale');color:#888888;"><p align="center" style="text-align: center;"><span style='color: rgb(0, 0, 0); font-family: "나눔명조",NanumMyeongjo,serif;'>​</span></p><p align="center" style="text-align: center;"><span style='color: rgb(0, 0, 0); font-family: "나눔명조",NanumMyeongjo,serif;'><strong>​Nothing is <span style="color: rgb(233, 125, 129);">impossible</span>, the word itself says <span style="color: rgb(255, 0, 0);">I'm possible!</span></strong></span></p><p align="center" style="text-align: center;"><span style='color: rgb(0, 0, 0); font-family: "나눔명조",NanumMyeongjo,serif;'><strong><span style="color: rgb(255, 0, 0);">​</span></strong></span><span style='color: rgb(0, 0, 0); font-family: "나눔명조",NanumMyeongjo,serif;'>impossible은 아무것도 아니다, impossible은 나는 가능하다는 것이다.</span></p><p align="center" style="text-align: center;"> </p><p align="center" style="text-align: center;"><span style='font-family: "나눔명조",NanumMyeongjo,serif;'>Audrey Hepburn 오드리 햅번 </span></p><p align="center" style="text-align: center;"> </p></blockquote><p align="center" style="text-align: center;"><span style='font-family: "3653765_12"; font-size: 12pt;'> <span style='font-family: "3653765_12"; font-size: 12pt;'>현재까지도 많은 이들에게 사랑을 받는 오드리햅번이 남긴 명언입니다.</span></span></p><p align="center" style="text-align: center;"><span style='font-family: "3653765_12"; font-size: 12pt;'>불가능하다라고 해석되는 부정적인 단어 IMPOSSIBLE을 해석한 그녀의 기지가 돋보입니다.</span></p><p align="center" style="text-align: center;"><span style='font-family: "3653765_12"; font-size: 12pt;'>​"불가능이 아니라
