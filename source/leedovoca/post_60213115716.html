  life lived for others is a life worthwhile﻿.</strong></span></font> </p></td></tr></tbody></table><p align="center" style="text-align: center;"><span style="font-family: 돋움,dotum;">오직 다른 사람을 위해서 산 인생만이 가치 있는 삶이다.</span></p><p align="center" style="text-align: center;"><span style="font-family: 돋움,dotum;">﻿</span><span style="font-family: 돋움,dotum;">앨버트 아인슈타인 [美물리학자, 1879-1955]</span></p><p><span style="font-family: 돋움,dotum;">​</span></p></blockquote><div align="left"><img alt="" class="_photoImage" data-lazy-src="https://postfiles.pstatic.net/20140418_177/leedovoca_1397781614001J0HOC_JPEG/400084706.jpg?type=w2" height="493" id="20140418_177/leedovoca_1397781614001J0HOC_JPEG/400084706.jpg" onclick="popview(this, '90000003_000000000000000E04FB3B44')" src="https://postfiles.pstatic.net/20140418_177/leedovoca_1397781614001J0HOC_JPEG/400084706.jpg?type=w2" style="cursor: pointer; rwidth: 740px; rheight: 493px;" width="740"/></div><p> </p><p>진정 만족스러운 인생을 위해서는 남을 생각하는 자세도 필요함을 의미하는 말인 것 같습니다.</p><p>바쁜 일상을 보내다 보면 주변을 돌아볼 여유가 잘 생기지 않을 때도 있습니다.</p><p>앨버트 아인슈타인이 남긴 명언을 기억하며, </p><p>꼭 다른 사람을 위해 의미 있는 일들을 하시는 여러분들이 되길 바랍니다.</p><p> </p><p> </p>
