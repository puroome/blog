<p align="center" style="TEXT-ALIGN: center"><strong><span style="COLOR: #000000">To climb steep hills requires slow pace at first.</span></strong></p>
<p align="center" style="TEXT-ALIGN: center">험한 언덕을 오를 때는 처음에 천천히 걸어가야 한다. </p>
<p align="center" style="TEXT-ALIGN: center">- William Shakespeare (윌리엄 셰익스피어, 영국 극작가)</p>
<p> </p></blockquote>
<p>영국의 극작가 윌리엄 셰익스피어가 남긴 명언입니다.</p>
