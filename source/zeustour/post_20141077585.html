<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #7820b9; FONT-SIZE: 12pt">너무 피곤해서,</span></p>

<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #7820b9; FONT-SIZE: 12pt">바로 곯아 떨어지다,</span></p>

<p align="center"> </p>

<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #45245b; FONT-SIZE: 12pt">- As soon as his head touched the pillow. he went out like a light.</span></p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #7820b9; FONT-SIZE: 12pt">  <span style="COLOR: #785c25"> 그는 머리가 </span></span><span style="FONT-FAMILY: '954102_12'; COLOR: #785c25; FONT-SIZE: 12pt">베개에 닿자마자 바로 곯아 떨</span><span style="FONT-FAMILY: '954102_12'; COLOR: #785c25; FONT-SIZE: 12pt">어졌</span><span style="FONT-FAMILY: '954102_12'; COLOR: #785c25; FONT-SIZE: 12pt">다.</span></p>
<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #45245b; FONT-SIZE: 12pt">- Right after dinner Cindy went out like a light.</span></p>
