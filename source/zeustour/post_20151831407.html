<div class="view" style="font-size:10pt; font-family:'985643_10';"><p align="center"><span style="FONT-FAMILY: '954102_12'; FONT-SIZE: 12pt">﻿</span> <img alt="" class="_photoImage" data-lazy-src="https://postfiles.pstatic.net/20120225_260/zeustour_1330132839001JhtLz_PNG/1.png?type=w2" height="327" id="20120225_260/zeustour_1330132839001JhtLz_PNG/1.png" onclick="popview(this, '90000003_0000000000000004B1248B6F')" src="https://postfiles.pstatic.net/20120225_260/zeustour_1330132839001JhtLz_PNG/1.png?type=w2" style="cursor: pointer;BORDER-BOTTOM: rgb(0,0,0) 0px solid; BORDER-LEFT: rgb(0,0,0) 0px solid; BORDER-TOP: rgb(0,0,0) 0px solid; BORDER-RIGHT: rgb(0,0,0) 0px solid; rwidth: 327px; rheight: 327px" width="327"/></p>
<p align="center"> </p>
<p> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt">그 여자가 나를 바람 맞혔어.</span><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"> </span></p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #ff0000; FONT-SIZE: 14pt">She stood me up.</span></p>
<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt">직역하면 </span><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"> 그 여자가 나를 세워났어,</span></p>
<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt">즉, 기다리게 하다가 결국 바람 맞혔다는 의미.</span></p>
<p align="center"> </p>
<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"><span style="COLOR: #ff0000; FONT-SIZE: 14pt">I was left out in the cold </span>도 같은 뜻,</span></p>
<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt">나는 한데(추운데) 버려진 상태로 있었다.</span></p>
<p align="center"> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt">다시 말해 엄청 바람 맞았다 는 의미.</span></p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"></span> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"></span> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #009e25; FONT-SIZE: 12pt">무시,따돌림 당하다, 왕따 의 의미로도 쓰임,</span></p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"></span> </p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #ff0000; FONT-SIZE: 12pt">I was left out in the cold at school.</span></p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt">나는 학교에서 왕따다.</span></p>
<p align="center"><span style="FONT-FAMILY: '954102_12'; COLOR: #3a32c3; FONT-SIZE: 12pt"> </span></p></div>
