<p><span style="font-family: Verdana; color: rgb(255, 0, 0);"><span style="FONT-SIZE: 12pt"><b>Heaven helps those who help themselves</b></span></span></p>
<p><span style="FONT-FAMILY: Verdana"><b>하늘은 스스로 돕는자를 돕는다</b></span></p>
<p>  </p><p><br/></p>
<p><span style="FONT-FAMILY: Verdana"></span> <img alt="" class="_photoImage" data-lazy-src="https://blogfiles.pstatic.net/MjAxOTA4MDNfODcg/MDAxNTY0NzYyMDUwMzg5.ErXR04IkLnzVLvT14hH8783UU0nXz7qIos_n41wX2qcg.klvWhuTlBNOZBSRLEDj8TeC-t6qQZKoX3tDyKUtv8_Mg.JPEG.zeustour/heaven-helps-those-who-help-themselves.jpg?type=w2" height="400" id="MjAxOTA4MDNfODcg/MDAxNTY0NzYyMDUwMzg5.ErXR04IkLnzVLvT14hH8783UU0nXz7qIos_n41wX2qcg.klvWhuTlBNOZBSRLEDj8TeC-t6qQZKoX3tDyKUtv8_Mg.JPEG.zeustour/heaven-helps-those-who-help-themselves.jpg" onclick="popview(this, '90000003_0000000000000004AD5171AC')" src="https://blogfiles.pstatic.net/MjAxOTA4MDNfODcg/MDAxNTY0NzYyMDUwMzg5.ErXR04IkLnzVLvT14hH8783UU0nXz7qIos_n41wX2qcg.klvWhuTlBNOZBSRLEDj8TeC-t6qQZKoX3tDyKUtv8_Mg.JPEG.zeustour/heaven-helps-those-who-help-themselves.jpg?type=w2" style="cursor: pointer; border-color: rgb(0, 0, 0); rwidth:400px; rheight:400px;" width="400"/></p><p><br/></p><p><br/></p>
<p><span style="FONT-FAMILY: Verdana">"하늘은 아무나 쉽게 공짜로 도움을 주지는 않는다" </span></p><p><span style="FONT-FAMILY: Verdana"><br/></span></p><p><span style="FONT-FAMILY: Verdana">는 뜻의 속담으로 </span><span style="font-family: Verdana; font-size: 10pt;">열심히 자신을 믿고 성실하게 노력하는 자 만이 </span></p><p><span style="font-family: Verdana; font-size: 10pt;"><br/></span></p><p><span style="font-family: Verdana; font-size: 10pt;">하늘의 도움을 받을 수 있다.</span></p>
<p> </p>
<p><span style="FONT-FAMILY: Verdana"></span> </p><p><img alt="" class="_photoImage" data-lazy-src="https://blogfiles.pstatic.net/MjAxOTA4MDNfMTk2/MDAxNTY0NzYyMDkyMjYy.AqX7E8Z_-JiHRHQCdp4zdXMSBVhr4Qe28OjAibBI_58g.iPBtXWv7B7XiEBtPNEwP2gkn_-4k3gpYctDzOF5PDvAg.PNG.zeustour/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.png?type=w2" height="224" id="MjAxOTA4MDNfMTk2/MDAxNTY0NzYyMDkyMjYy.AqX7E8Z_-JiHRHQCdp4zdXMSBVhr4Qe28OjAibBI_58g.iPBtXWv7B7XiEBtPNEwP2gkn_-4k3gpYctDzOF5PDvAg.PNG.zeustour/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.png" onclick="popview(this, '90000003_0000000000000004AD5171AC')" src="https://blogfiles.pstatic.net/MjAxOTA4MDNfMTk2/MDAxNTY0NzYyMDkyMjYy.AqX7E8Z_-JiHRHQCdp4zdXMSBVhr4Qe28OjAibBI_58g.iPBtXWv7B7XiEBtPNEwP2gkn_-4k3gpYctDzOF5PDvAg.PNG.zeustour/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.png?type=w2" style="cursor: pointer; border-color: rgb(0, 0, 0); rwidth:400px; rheight:224px;" width="400"/><br/></p><p><br/></p><p><br/></p>
<p><span style="FONT-FAMILY: Verdana">유사한 표현으로</span></p>
<p> </p>
<p><span style="font-family: Verdana; color: rgb(255, 0, 0);"><b>Do your best and then God will do the rest.</b></span></p>
<p><span style="FONT-FAMILY: Verdana">너의 최선을 다해라 그러면 하나님이 그 나머지는 </span></p><p><span style="FONT-FAMILY: Verdana"><br/></span></p><p><span style="FONT-FAMILY: Verdana">해결 해 주실 것 이다. </span></p><p><span style="FONT-FAMILY: Verdana"><br/></span></p><p><span style="FONT-FAMILY: Verdana">(신에게 맡겨라)</span></p>
