<p><span style="font-family: Verdana; color: rgb(114, 25, 71);">통화를 심하다 싶을 정도로 길게 할 때도 쓰지만,</span></p>

<p><span style="font-family: Verdana; color: rgb(114, 25, 71);"><strong>전화를 뻔질나게 너무 자주  한다</strong>  의 뜻 으로도 사용 한다.</span></p>
<p> </p>
