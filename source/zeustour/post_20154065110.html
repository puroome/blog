<p><span style="FONT-FAMILY: '954102_12'; COLOR: #ff0000; FONT-SIZE: 12pt">What are you doing in this neck of the woods?</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt"></span> </p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">뜻밖의 사람을 예상치 못한 장소에서 만나서 놀랐을 때 하는 말,</span></p>
<p> </p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #ff0000; FONT-SIZE: 12pt">너 이 동네는 웬일 이니?</span></p>
<p> </p>
<p> </p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">여긴 무슨일로 왔니?</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">What brought you here?​</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">​</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">​</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">너를 여기서 만나다니?</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt">​What a coinsidence meeting you here!</span></p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt"> </span></p>
<p> </p>
<p><span style="FONT-FAMILY: '954102_12'; COLOR: #1c4827; FONT-SIZE: 12pt"> 등등...</span></p>
