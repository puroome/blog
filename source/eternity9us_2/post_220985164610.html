ss="se-fs- se-ff-nanumgothic" id="SE-3f260cbe-7597-4fcc-9035-a1760c56d088" style="color:#0092e6;"><b>less</b></span><span class="se-fs- se-ff-nanumgothic" id="SE-d7a9c23e-5006-4fcd-8551-42954433fa08" style=""><b>​</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-a1ab654b-52b3-47c5-a67b-eaac50c6c3f0" style="">]를 붙여서 녹이 적은 또는 녹</span><span class="se-fs- se-ff-nanumgothic" id="SE-a31cb4a8-a34a-4159-ae5a-f914943d0a15" style="">이 없는(녹이 슬지 않은) 금속을 의미해요.</span></p><!-- } SE-TEXT -->
