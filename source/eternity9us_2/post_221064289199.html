를 사용해서 이름이 자이리톨(</span><span class="se-fs- se-ff-nanumgothic" id="SE-78355811-a8af-4e36-a397-c6a2c99d9c5a" style="color:#0095e9;"><b>xyl</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-859da1f9-284a-4846-bec8-2292ed0f2c3d" style="color:#000000;">itol)이라고 불리는데, 나무[</span><span class="se-fs- se-ff-nanumgothic" id="SE-d9aaa6bb-75f5-472e-8df0-926a4fc4a928" style="color:#0092e6;"><b>xyl</b></span><span class="se-fs- se-ff-nanumgothic se-weight-unset" id="SE-0cbba339-6ed1-4670-a7e8-482ae5c215f3" style="color:#000000;">]에서 나오는 감미료이기 때문에 이렇게 이름을</span><span class="se-fs- se-ff-nanumgothic" id="SE-20cb9481-3f9d-4baa-bda8-0a0a24d3278e" style="color:#000000;"> 지은 것이에요.</span></p><!-- } SE-TEXT -->
