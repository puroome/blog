<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blog (Cloud Sync)</title>
    <script src="id/_id_list.js"></script>
    <script src="embed-helpers.js"></script>
    <style>
        :root{
            --accent:#3b82f6; --accent-press:#2563eb;
            --text:#1f2933; --muted:#6b7280; --border:#e8eaed;
            --card:#ffffff; --bg:#f4f5f7; --danger:#ef4444; --edit:#fffbe6;
        }
        *{box-sizing:border-box;}
        html,body{height:100%;}
        body{
            margin:0; background:#e7e9ee; color:var(--text);
            font-family:'Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
        }

        /* 폰/컴 동일: 가운데 정렬된 단일 컬럼 */
        #app{
            max-width:720px; margin:0 auto;
            height:100vh; height:100dvh;
            display:flex; flex-direction:column;
            background:var(--bg); overflow:hidden;
            box-shadow:0 0 50px rgba(0,0,0,.07);
        }

        /* 상단 바 (화면마다 버튼만 교체) */
        #topbar{
            position:relative;
            flex:0 0 auto; display:flex; align-items:center; gap:8px;
            padding:12px 14px; background:var(--card);
            border-bottom:1px solid var(--border);
        }
        #back-btn{
            flex:0 0 auto; width:34px; height:34px; border:none; cursor:pointer;
            background:transparent; color:var(--text); font-size:26px; line-height:1;
            border-radius:9px; display:none; align-items:center; justify-content:center;
        }
        #back-btn:hover{background:#f1f2f4;}
        #screen-title{
            flex:1 1 auto; min-width:0; margin:0; font-size:18px; font-weight:700;
            display:flex; align-items:center; gap:8px;
        }
        #title-text{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        #title-icon{ height:1em; width:auto; flex:0 0 auto; display:none; }

        /* 첫 화면: 제목을 메뉴바 정중앙에, 더 굵게, 1.2배(=21.6px) */
        #topbar.home #screen-title{
            position:absolute; left:50%; top:50%;
            transform:translate(-50%,-50%);
            flex:0 0 auto; max-width:70%; justify-content:center;
            font-size:21.6px; font-weight:800;
        }
        #topbar.home #title-icon{ display:inline-block; }
        #topbar.home #list-actions{ margin-left:auto; }
        .actions{display:flex; align-items:center; gap:6px; flex:0 0 auto;}
        #reader-actions{display:none;}
        .tb-btn{
            border:none; cursor:pointer; white-space:nowrap; text-decoration:none;
            background:#f1f2f4; color:var(--text); font-size:14px; font-weight:600;
            padding:7px 12px; border-radius:9px;
        }
        .tb-btn:hover{background:#e6e8eb;}
        .tb-btn.primary{background:var(--accent); color:#fff;}
        .tb-btn.primary:hover{background:var(--accent-press);}
        .tb-btn.danger{background:#fde8e8; color:var(--danger);}
        .tb-btn.link{background:transparent; color:var(--accent); padding:7px 4px;}

        /* 동기화 상태: 평소엔 숨고, 동작 시에만 잠깐 떴다 사라지는 토스트 */
        #sync-status{
            position:fixed; top:14px; left:50%;
            transform:translateX(-50%) translateY(-8px);
            z-index:100; max-width:90vw;
            padding:8px 16px; font-size:13px; font-weight:700; color:#2ecc71;
            background:var(--card); border:1px solid var(--border); border-radius:999px;
            box-shadow:0 6px 20px rgba(0,0,0,.12);
            opacity:0; pointer-events:none;
            transition:opacity .25s ease, transform .25s ease;
        }
        #sync-status.show{ opacity:1; transform:translateX(-50%) translateY(0); }

        /* 목록 화면 (블로그/글 공용) */
        #list-screen{
            flex:1 1 auto; min-height:0; overflow-y:auto;
            padding:14px; display:flex; flex-direction:column; gap:10px;
        }
        .empty-state{margin:auto; text-align:center; color:var(--muted); padding:40px 20px;}

        .row{
            display:flex; align-items:center; gap:12px; cursor:pointer;
            background:var(--card); border:1px solid var(--border); border-radius:14px;
            padding:16px; transition:transform .08s ease, box-shadow .12s ease;
        }
        .row:hover{box-shadow:0 4px 14px rgba(0,0,0,.06); transform:translateY(-1px);}
        .row:active{transform:translateY(0);}
        .row.blog{background:rgba(59,130,246,.2); border-left:3px solid var(--accent);}
        .row.post{background:rgba(250,204,21,.2);}
        .row .name{
            flex:1 1 auto; font-weight:600; font-size:16px;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }
        .row .count{
            flex:0 0 auto; font-size:12px; color:var(--muted);
            background:#f1f2f4; padding:3px 9px; border-radius:999px;
        }
        .row .edited{flex:0 0 auto; color:var(--accent); font-size:13px;}
        .row .chev{flex:0 0 auto; color:#c2c7cf; font-size:20px; line-height:1;}
        .delete-checkbox{flex:0 0 auto; width:18px; height:18px; display:none;}

        /* 편집(숨기기) 모드 */
        #list-screen.edit-mode .delete-checkbox{display:block;}
        #list-screen.edit-mode .row{cursor:default;}
        #list-screen.edit-mode .row:hover{transform:none; box-shadow:none;}
        /* 편집 모드: 이름/제목을 클릭해 직접 수정 (노란 칸이 편집 가능 표시) */
        #list-screen.edit-mode .row .name{
            white-space:normal; overflow:visible; text-overflow:clip;
            cursor:text; background:var(--edit); border:1px solid #f0e6b8;
            border-radius:6px; padding:5px 8px; margin:-1px 0;
        }
        #list-screen.edit-mode .row .name:focus{ outline:2px solid var(--accent); outline-offset:0; }

        /* 본문 읽기 화면 */
        #reader-screen{
            flex:1 1 auto; min-height:0; display:none; flex-direction:column;
        }
        #content-frame{flex:1 1 auto; width:100%; border:none; background:#fff;}
        #content-edit{
            flex:1 1 auto; width:100%; padding:20px; overflow-y:auto; display:none;
            background:var(--edit); outline:none; line-height:1.7;
        }
        #reader-nav{
            flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
            padding:10px 16px; background:rgba(168,85,247,.2); border-top:1px solid var(--border);
            padding-bottom:calc(10px + env(safe-area-inset-bottom));
        }
        .nav-spacer{ flex:1 1 0; }
        .nav-center{ flex:0 0 auto; display:flex; align-items:center; gap:24px; }
        #reader-nav button{
            width:48px; height:48px; border:none; border-radius:50%; cursor:pointer;
            background:#f1f2f4; color:var(--text); font-size:20px; line-height:1;
        }
        #reader-nav button:hover:not(:disabled){background:var(--accent); color:#fff;}
        #reader-nav button:disabled{opacity:.35; cursor:default;}
        #reader-position{font-size:14px; color:var(--muted); min-width:64px; text-align:center;}
        #learn-toggle{
            flex:1 1 0; display:flex; align-items:center; justify-content:flex-end; gap:6px;
            cursor:pointer; user-select:none; font-size:14px; font-weight:600; color:var(--text);
        }
        #learn-checkbox{ width:20px; height:20px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="app">
        <header id="topbar">
            <button id="back-btn" onclick="goBack()" aria-label="뒤로">‹</button>
            <h1 id="screen-title"><img id="title-icon" src="icon.png" alt="" onerror="this.style.display='none'"><span id="title-text">Naver Blog</span></h1>

            <div id="list-actions" class="actions">
                <button id="edit-btn" class="tb-btn" onclick="toggleEditMode()">편집</button>
                <button id="delete-btn" class="tb-btn danger" style="display:none;" onclick="deleteSelected()">숨기기</button>
            </div>

            <div id="reader-actions" class="actions">
                <a id="header-link" href="#" target="_blank" class="tb-btn link">원본</a>
                <button id="content-edit-btn" class="tb-btn" onclick="toggleContentEdit()">편집</button>
                <button id="content-save-btn" class="tb-btn primary" style="display:none;" onclick="saveContentEdit()">저장</button>
                <button id="content-cancel-btn" class="tb-btn" style="display:none;" onclick="cancelContentEdit()">취소</button>
            </div>
        </header>

        <div id="sync-status"></div>

        <!-- 블로그 목록 / 글 목록 (같은 컨테이너 재사용) -->
        <main id="list-screen">
            <ul id="post-list" style="display:contents; list-style:none; margin:0; padding:0;"></ul>
        </main>

        <!-- 본문 읽기 -->
        <section id="reader-screen">
            <iframe id="content-frame"></iframe>
            <div id="content-edit"></div>
            <nav id="reader-nav">
                <span class="nav-spacer"></span>
                <div class="nav-center">
                    <button id="prev-post" onclick="gotoPost(-1)" aria-label="이전 글">‹</button>
                    <span id="reader-position"></span>
                    <button id="next-post" onclick="gotoPost(1)" aria-label="다음 글">›</button>
                </div>
                <label id="learn-toggle"><input type="checkbox" id="learn-checkbox" onchange="toggleLearned()"></label>
            </nav>
        </section>
    </div>

    <script>
        // 전역 데이터 배열 (id/*.js 파일들이 채움)
        window.blogsData = [];

        // 파이썬 설정값 치환
        const FIREBASE_URL = "https://blog-aaa78-default-rtdb.asia-southeast1.firebasedatabase.app/";

        let isEditMode = false;
        let currentView = 'blogs';      // 'blogs' | 'posts' | 'reader'
        let currentBlogId = null;
        let currentContentId = null;
        let currentContentUrl = null;
        let currentVisiblePosts = [];   // 현재 블로그의 (숨김 제외) 글 목록 — 이전/다음 이동용
        let currentPostIndex = -1;

        // Firebase에는 "변경분"만 저장:
        //   deleted_blogs / deleted_posts   → 숨김
        //   content_overrides               → 편집한 본문
        //   blog_name_overrides             → 편집한 블로그 이름
        //   post_title_overrides            → 편집한 글 제목
        //   learned                         → 학습 완료 표시
        // 변경하지 않은 이름/제목/본문은 id/*.js(및 source/*.html) 원본을 사용.
        let dbData = { deleted_blogs: {}, deleted_posts: {}, content_overrides: {}, learned: {}, blog_name_overrides: {}, post_title_overrides: {} };

        document.addEventListener('DOMContentLoaded', async function() {
            await loadAllBlogDataFiles();
            await loadFirebaseData();
            renderBlogList();
            history.replaceState({ guard: true }, '');      // 진입 지점(가드): 첫 화면에서 뒤로가도 앱을 벗어나지 않게
            history.pushState({ screen: 'blogs' }, '');       // 그 위에 첫 화면
        });

        // _id_list.js의 activeBlogIds를 바탕으로 개별 데이터 JS를 동적 로드
        async function loadAllBlogDataFiles() {
            if (typeof activeBlogIds === 'undefined' || activeBlogIds.length === 0) {
                setStatus("📂 등록된 데이터가 없습니다.", "#e74c3c", true);
                return;
            }
            const promises = activeBlogIds.map(id => new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = `id/${id}.js`;
                script.onload = resolve;
                script.onerror = () => {
                    console.warn(`${id}.js 파일을 찾을 수 없습니다. _id_list.js를 확인하세요.`);
                    resolve(); // 하나 실패해도 나머지는 진행
                };
                document.head.appendChild(script);
            }));
            await Promise.all(promises);
        }

        async function loadFirebaseData() {
            if (!FIREBASE_URL || FIREBASE_URL === "__" + "FIREBASE_DB_URL" + "__") {
                setStatus("⚠️ 오프라인 모드", "#e74c3c", true);
                return;
            }
            try {
                let url = FIREBASE_URL;
                if (!url.endsWith('/')) url += '/';
                const res = await fetch(url + '.json');
                const data = await res.json() || {};
                dbData.deleted_blogs = data.deleted_blogs || {};
                dbData.deleted_posts = data.deleted_posts || {};
                dbData.content_overrides = data.content_overrides || {};
                dbData.learned = data.learned || {};
                dbData.blog_name_overrides = data.blog_name_overrides || {};
                dbData.post_title_overrides = data.post_title_overrides || {};
                setStatus("synced", "#2ecc71");
            } catch (err) {
                console.error("Firebase 로드 오류", err);
                setStatus("❌ 클라우드 연결 실패", "#e74c3c", true);
            }
        }

        async function updateFirebase(path, value) {
            if (!FIREBASE_URL || FIREBASE_URL === "__" + "FIREBASE_DB_URL" + "__") return;
            try {
                let url = FIREBASE_URL;
                if (!url.endsWith('/')) url += '/';
                await fetch(url + path + '.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(value)
                });
            } catch (e) { console.error("Firebase 저장 오류", e); }
        }

        // 동기화 상태 메시지(토스트) 비활성화 — 성공/진행/오류 어떤 메시지도 띄우지 않음
        function setStatus() { /* no-op */ }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        // 화면 전환: 어떤 컨테이너/버튼을 보일지만 결정 (제목은 각 render가 설정)
        function setScreen(view) {
            currentView = view;
            const isReader = (view === 'reader');
            document.getElementById('list-screen').style.display   = isReader ? 'none' : 'flex';
            document.getElementById('reader-screen').style.display = isReader ? 'flex' : 'none';
            document.getElementById('back-btn').style.display      = (view === 'blogs') ? 'none' : 'inline-flex';
            document.getElementById('list-actions').style.display  = isReader ? 'none' : 'flex';
            document.getElementById('reader-actions').style.display= isReader ? 'flex' : 'none';

            // 화면별 상단/하단바 색 — 단, 본문 화면에서 '학습 완료'한 글이면 위·아래 메뉴 색 모두 제거
            const topbar = document.getElementById('topbar');
            if (view === 'reader') {
                const learned = isLearned(currentBlogId, currentContentId);
                topbar.style.background = learned ? 'var(--card)' : 'rgba(250,204,21,.2)';
                document.getElementById('reader-nav').style.background = learned ? 'var(--card)' : 'rgba(168,85,247,.2)';
            } else {
                topbar.style.background = (view === 'blogs') ? 'rgba(239,68,68,.2)' : 'rgba(59,130,246,.2)';
            }

            // 첫 화면에서만 제목을 가운데 정렬하고 아이콘을 표시 (.home → CSS가 처리)
            topbar.classList.toggle('home', view === 'blogs');
        }

        // ponytail: id가 시간순(예: 네이버 블로그 logNo — 숫자가 클수록 최신)이라고 가정해 정렬.
        //   ceiling — id가 시간과 무관한 형식이면 "최신순"이 어긋남.
        //             그 경우 글의 작성일이 담긴 필드명을 알려주면 그 값 기준으로 바꿔줌.
        function compareId(a, b) {
            const na = Number(a), nb = Number(b);
            if (!isNaN(na) && !isNaN(nb)) return na - nb;     // 둘 다 숫자면 숫자 비교
            return String(a).localeCompare(String(b), 'ko');  // 아니면 문자 비교
        }

        // 현재 블로그에서 숨기지 않은 글 목록 (최신 글이 위로)
        function getVisiblePosts(blogId) {
            const blog = window.blogsData.find(b => b.id === blogId);
            if (!blog) return [];
            const deleted = dbData.deleted_posts[blogId] || {};
            return blog.posts
                .filter(p => !deleted[p.id])
                .sort((a, b) => compareId(b.id, a.id)); // 큰 id(최신) 먼저 → 내림차순
        }

        // 편집된 이름/제목이 있으면 그것을, 없으면 id/*.js의 원본을 사용
        function getBlogName(blog) {
            const ov = dbData.blog_name_overrides[blog.id];
            return (ov !== undefined && ov !== null && ov !== '') ? ov : blog.name;
        }
        function getPostTitle(blogId, post) {
            const ov = dbData.post_title_overrides[blogId] && dbData.post_title_overrides[blogId][post.id];
            return (ov !== undefined && ov !== null && ov !== '') ? ov : post.title;
        }

        // 학습 여부
        function isLearned(blogId, postId) {
            return !!(dbData.learned[blogId] && dbData.learned[blogId][postId]);
        }
        // 블로그의 (보이는) 모든 글이 학습 완료인지
        function isBlogFullyLearned(blogId) {
            const visible = getVisiblePosts(blogId);
            return visible.length > 0 && visible.every(p => isLearned(blogId, p.id));
        }
        // 블로그의 학습 비율(0~1): 학습 체크한 글 수 / 보이는 전체 글 수
        function blogLearnedRatio(blogId) {
            const visible = getVisiblePosts(blogId);
            if (visible.length === 0) return 0;
            const learnedCount = visible.filter(p => isLearned(blogId, p.id)).length;
            return learnedCount / visible.length;
        }

        // 학습 체크 토글 → Firebase에 기록/해제
        async function toggleLearned() {
            const checked = document.getElementById('learn-checkbox').checked;
            const blogId = currentBlogId, postId = currentContentId;
            if (!blogId || !postId) return;
            if (!dbData.learned[blogId]) dbData.learned[blogId] = {};
            setStatus(checked ? "☁️ 학습 기록 중..." : "☁️ 학습 해제 중...", "#2ecc71");
            if (checked) dbData.learned[blogId][postId] = true;
            else delete dbData.learned[blogId][postId];
            setScreen('reader'); // 체크 즉시 위·아래 메뉴 색 갱신
            await updateFirebase(`learned/${blogId}/${postId}`, checked ? true : null); // null → RTDB에서 삭제
            setStatus("synced", "#2ecc71");
        }

        function renderBlogList() {
            setScreen('blogs');
            document.getElementById('title-text').innerText = 'Blog';
            updateEditButtons();

            const listEl = document.getElementById('post-list');
            listEl.innerHTML = '';

            const visibleBlogs = window.blogsData
                .filter(b => !dbData.deleted_blogs[b.id])
                .sort((a, b) => compareId(a.id, b.id)); // ID 오름차순 고정
            if (visibleBlogs.length === 0) {
                listEl.innerHTML = '<div class="empty-state">표시할 블로그가 없어요.</div>';
                return;
            }

            visibleBlogs.forEach(blog => {
                const deletedCount = dbData.deleted_posts[blog.id] ? Object.keys(dbData.deleted_posts[blog.id]).length : 0;
                const remaining = blog.posts.length - deletedCount;
                // 편집 모드일 때만 이름을 직접 수정 가능하게(클릭=편집, 행 클릭과 충돌 방지 위해 stopPropagation)
                const nameAttrs = isEditMode
                    ? " contenteditable='true' onclick='event.stopPropagation()' onkeydown='nameKeydown(event)' onblur='saveBlogName(\"" + blog.id + "\", this)'"
                    : "";
                // 학습 진척도: 학습한 비율만큼 오른쪽에서부터 파란색을 지움
                //   bluePct = 왼쪽에 남는 파란색 비율(%). 학습 0% → 100%(전부 파랑), 학습 100% → 0%(전부 흰색)
                const bluePct = (1 - blogLearnedRatio(blog.id)) * 100;
                const fill = "rgba(59,130,246,.2)";
                const bgStyle = "background:linear-gradient(to right,"
                    + fill + " 0%," + fill + " " + bluePct + "%,"
                    + "var(--card) " + bluePct + "%,var(--card) 100%);";
                const li = document.createElement('li');
                li.className = isBlogFullyLearned(blog.id) ? 'row' : 'row blog'; // 전부 학습 완료면 파란 테두리 제거
                li.setAttribute('style', bgStyle);
                li.setAttribute('onclick', `onRowClick('blog','${blog.id}', this)`);
                li.innerHTML =
                    "<input type='checkbox' class='delete-checkbox' value='" + blog.id + "' onclick='event.stopPropagation()'>" +
                    "<span class='name'" + nameAttrs + ">" + escapeHtml(getBlogName(blog)) + "</span>" +
                    "<span class='count'>" + remaining + "</span>" +
                    "<span class='chev'>›</span>";
                listEl.appendChild(li);
            });
        }

        function renderPostList(blogId) {
            currentBlogId = blogId;
            const blog = window.blogsData.find(b => b.id === blogId);
            if (!blog) return;

            setScreen('posts');
            document.getElementById('title-text').innerText = getBlogName(blog);
            updateEditButtons();

            const listEl = document.getElementById('post-list');
            listEl.innerHTML = '';

            const visiblePosts = getVisiblePosts(blogId);
            if (visiblePosts.length === 0) {
                listEl.innerHTML = '<div class="empty-state">표시할 글이 없어요.</div>';
                return;
            }

            visiblePosts.forEach(post => {
                const edited = (dbData.content_overrides[blogId] && dbData.content_overrides[blogId][post.id]) ? "<span class='edited'>✏️</span>" : "";
                // 편집 모드일 때만 제목을 직접 수정 가능하게
                const nameAttrs = isEditMode
                    ? " contenteditable='true' onclick='event.stopPropagation()' onkeydown='nameKeydown(event)' onblur='savePostTitle(\"" + blogId + "\", \"" + post.id + "\", this)'"
                    : "";
                const li = document.createElement('li');
                li.className = isLearned(blogId, post.id) ? 'row' : 'row post'; // 학습 완료면 노란색 제거
                li.setAttribute('onclick', `onRowClick('post','${post.id}', this)`);
                li.innerHTML =
                    "<input type='checkbox' class='delete-checkbox' value='" + post.id + "' onclick='event.stopPropagation()'>" +
                    "<span class='name'" + nameAttrs + ">" + escapeHtml(getPostTitle(blogId, post)) + "</span>" +
                    edited +
                    "<span class='chev'>›</span>";
                listEl.appendChild(li);
            });
        }

        // 목록 행 클릭: 편집모드면 선택 토글, 아니면 진입
        function onRowClick(kind, id, el) {
            if (isEditMode) {
                const cb = el.querySelector('.delete-checkbox');
                if (cb) cb.checked = !cb.checked;
                return;
            }
            if (kind === 'blog') {
                history.pushState({ screen: 'posts', blogId: id }, '');
                renderPostList(id);
            } else {
                history.pushState({ screen: 'reader', blogId: currentBlogId, postId: id }, '');
                loadContent(currentBlogId, id);
            }
        }

        // ── 본문 가공 파이프라인 ──
        // 순서가 중요합니다.
        //   1) restoreGifLinks   : 빈 GIF 링크 블록을 <img>로 복구
        //   2) embedYoutube      : 유튜브 <a>를 iframe 임베드로
        //   3) removeEmptyOembed : 영상 자리의 빈 oembed 박스 제거
        //   4) addNoReferrer     : 모든 <img>에 referrerpolicy="no-referrer"
        //   5) injectReadingStyle: 읽기용 기본 타이포(글자·줄간격·여백) 주입
        function processContentHtml(html) {
            if (typeof restoreGifLinks === 'function')   html = restoreGifLinks(html);
            if (typeof embedYoutube === 'function')      html = embedYoutube(html);
            if (typeof removeEmptyOembed === 'function') html = removeEmptyOembed(html);
            if (typeof addNoReferrer === 'function')     html = addNoReferrer(html);
            html = injectReadingStyle(html);
            return html;
        }

        // ponytail: 읽기 기본 스타일 주입.
        //   ceiling — 이 스타일은 "기본값"이라 블로그 원본이 같은 속성을 직접 지정하면 원본이 이김.
        //             모든 글을 강제로 통일하려면 각 규칙에 !important를 붙이면 됨(취향에 따라).
        function injectReadingStyle(html) {
            const style = "<style id='reader-base'>"
                + "html{font-size:17px;}"
                + "body{max-width:680px;margin:0 auto;padding:20px 18px;line-height:1.75;"
                + "color:#1f2933;word-break:keep-all;overflow-wrap:anywhere;"
                + "font-family:'Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}"
                + "img,video,iframe{max-width:100%;height:auto;}"
                + "</style>";
            if (/<head[^>]*>/i.test(html)) return html.replace(/<head[^>]*>/i, m => m + style);
            if (/<body[^>]*>/i.test(html)) return html.replace(/<body[^>]*>/i, m => m + style);
            return style + html; // head/body 없는 조각(fragment)
        }

        // 원본(또는 편집본) fetch → 가공 → srcdoc 렌더
        async function renderContentToFrame() {
            const frame = document.getElementById('content-frame');
            const contentId = currentContentId;
            const url = currentContentUrl;

            const overrideHtml = dbData.content_overrides[currentBlogId] && dbData.content_overrides[currentBlogId][contentId];
            let html;
            if (overrideHtml) {
                html = overrideHtml;
            } else {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('fetch failed');
                    html = await res.text();
                } catch (err) {
                    html = "<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'></head><body style='font-family:sans-serif;padding:20px;color:#e74c3c;'>본문을 불러오지 못했습니다.</body></html>";
                }
            }

            // fetch 대기 중 사용자가 다른 글로 넘어갔으면 덮어쓰지 않음 (경합 방지)
            if (currentContentId !== contentId) return;

            frame.removeAttribute('src');
            frame.srcdoc = processContentHtml(html);
        }

        function loadContent(blogId, postId) {
            const blog = window.blogsData.find(b => b.id === blogId);
            if (!blog) return;
            const visible = getVisiblePosts(blogId);
            const idx = visible.findIndex(p => p.id === postId);
            const post = visible[idx] || blog.posts.find(p => p.id === postId);
            if (!post) return;

            currentBlogId = blogId;
            currentContentId = postId;
            currentContentUrl = 'source/' + blogId + '/' + postId + '.html';
            currentVisiblePosts = visible;
            currentPostIndex = idx;

            setScreen('reader');
            document.getElementById('title-text').innerText = getPostTitle(blogId, post);
            document.getElementById('header-link').href = post.link || '#';

            // 본문 편집 UI 초기화
            document.getElementById('content-edit-btn').style.display = 'inline-flex';
            document.getElementById('content-save-btn').style.display = 'none';
            document.getElementById('content-cancel-btn').style.display = 'none';
            document.getElementById('content-edit').style.display = 'none';
            document.getElementById('content-frame').style.display = 'block';
            document.getElementById('reader-nav').style.display = 'flex';
            document.getElementById('learn-checkbox').checked = isLearned(blogId, postId); // 학습 체크 상태 반영

            updateNav();
            renderContentToFrame();
        }

        function updateNav() {
            const total = currentVisiblePosts.length;
            document.getElementById('reader-position').innerText = total ? (currentPostIndex + 1) + ' / ' + total : '';
            document.getElementById('prev-post').disabled = currentPostIndex <= 0;
            document.getElementById('next-post').disabled = currentPostIndex >= total - 1;
        }

        function gotoPost(delta) {
            const t = currentPostIndex + delta;
            if (t < 0 || t >= currentVisiblePosts.length) return;
            const id = currentVisiblePosts[t].id;
            history.replaceState({ screen: 'reader', blogId: currentBlogId, postId: id }, ''); // 이전/다음은 히스토리 교체(쌓지 않음)
            loadContent(currentBlogId, id);
        }

        async function toggleContentEdit() {
            if (!currentContentUrl) return;
            const editDiv = document.getElementById('content-edit');
            const frame = document.getElementById('content-frame');

            let html = dbData.content_overrides[currentBlogId] && dbData.content_overrides[currentBlogId][currentContentId];
            if (!html) {
                try {
                    const res = await fetch(currentContentUrl);
                    if (!res.ok) throw new Error('fetch failed');
                    html = await res.text();
                } catch (err) {
                    alert('원본 텍스트를 불러오지 못했습니다.');
                    return;
                }
            }

            editDiv.innerHTML = html;
            editDiv.setAttribute('contenteditable', 'true');
            frame.style.display = 'none';
            editDiv.style.display = 'block';
            document.getElementById('reader-nav').style.display = 'none';

            document.getElementById('content-edit-btn').style.display = 'none';
            document.getElementById('content-save-btn').style.display = 'inline-flex';
            document.getElementById('content-cancel-btn').style.display = 'inline-flex';
            editDiv.focus();
        }

        async function saveContentEdit() {
            const editDiv = document.getElementById('content-edit');
            const newHtml = editDiv.innerHTML;

            setStatus("☁️ 클라우드 저장 중...", "#2ecc71");

            if (!dbData.content_overrides[currentBlogId]) dbData.content_overrides[currentBlogId] = {};
            dbData.content_overrides[currentBlogId][currentContentId] = newHtml;

            await updateFirebase(`content_overrides/${currentBlogId}/${currentContentId}`, newHtml);
            setStatus("✅ 클라우드 저장 완료", "#2ecc71");

            exitContentEditView(); // 저장 후엔 읽기 화면에 그대로 머무름
        }

        function cancelContentEdit() { exitContentEditView(); }

        function exitContentEditView() {
            const frame = document.getElementById('content-frame');
            const editDiv = document.getElementById('content-edit');
            editDiv.removeAttribute('contenteditable');
            editDiv.style.display = 'none';
            frame.style.display = 'block';
            document.getElementById('reader-nav').style.display = 'flex';

            document.getElementById('content-edit-btn').style.display = 'inline-flex';
            document.getElementById('content-save-btn').style.display = 'none';
            document.getElementById('content-cancel-btn').style.display = 'none';

            renderContentToFrame(); // 저장한 편집본으로 다시 렌더
        }

        // Enter 키로 편집 종료(줄바꿈 대신 저장 처리)
        function nameKeydown(e) {
            if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
        }

        // 블로그 이름 저장:
        //   - 비우거나 원본과 같으면 → override 제거(= id/*.js 값으로 복귀)
        //   - 다르면 → Firebase(blog_name_overrides)에 저장
        async function saveBlogName(blogId, el) {
            const blog = window.blogsData.find(b => b.id === blogId);
            if (!blog) return;
            const newName = el.textContent.trim();
            const original = blog.name;
            const currentOverride = dbData.blog_name_overrides[blogId];

            if (newName === '' || newName === original) {
                if (currentOverride !== undefined && currentOverride !== null) {
                    delete dbData.blog_name_overrides[blogId];
                    setStatus("☁️ 이름 복원 중...", "#2ecc71");
                    await updateFirebase(`blog_name_overrides/${blogId}`, null); // null → RTDB에서 삭제
                    setStatus("synced", "#2ecc71");
                }
                if (newName === '') el.textContent = original; // 빈 값이면 화면을 원래 이름으로 되돌림
                return;
            }
            if (newName === currentOverride) return; // 변경 없음

            dbData.blog_name_overrides[blogId] = newName;
            setStatus("☁️ 이름 저장 중...", "#2ecc71");
            await updateFirebase(`blog_name_overrides/${blogId}`, newName);
            setStatus("✅ 저장 완료", "#2ecc71");
        }

        // 글 제목 저장: 위와 동일한 규칙 (post_title_overrides)
        async function savePostTitle(blogId, postId, el) {
            const blog = window.blogsData.find(b => b.id === blogId);
            if (!blog) return;
            const post = blog.posts.find(p => p.id === postId);
            if (!post) return;
            const newTitle = el.textContent.trim();
            const original = post.title;
            const currentOverride = dbData.post_title_overrides[blogId] && dbData.post_title_overrides[blogId][postId];

            if (newTitle === '' || newTitle === original) {
                if (currentOverride !== undefined && currentOverride !== null) {
                    if (dbData.post_title_overrides[blogId]) delete dbData.post_title_overrides[blogId][postId];
                    setStatus("☁️ 제목 복원 중...", "#2ecc71");
                    await updateFirebase(`post_title_overrides/${blogId}/${postId}`, null);
                    setStatus("synced", "#2ecc71");
                }
                if (newTitle === '') el.textContent = original;
                return;
            }
            if (newTitle === currentOverride) return;

            if (!dbData.post_title_overrides[blogId]) dbData.post_title_overrides[blogId] = {};
            dbData.post_title_overrides[blogId][postId] = newTitle;
            setStatus("☁️ 제목 저장 중...", "#2ecc71");
            await updateFirebase(`post_title_overrides/${blogId}/${postId}`, newTitle);
            setStatus("✅ 저장 완료", "#2ecc71");
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            // 편집 모드 진입/해제 시 목록을 다시 그려 이름/제목 편집 가능 상태를 반영
            if (currentView === 'blogs') renderBlogList();
            else if (currentView === 'posts') renderPostList(currentBlogId);
            else updateEditButtons();
        }

        function updateEditButtons() {
            document.getElementById('list-screen').classList.toggle('edit-mode', isEditMode);
            document.getElementById('delete-btn').style.display = isEditMode ? 'inline-flex' : 'none';
            document.getElementById('edit-btn').innerText = isEditMode ? '완료' : '편집';
        }

        async function deleteSelected() {
            const checked = document.querySelectorAll('.delete-checkbox:checked');
            isEditMode = false; // 숨기기 후엔 편집 모드 종료(기존 동작 유지)
            setStatus("☁️ 클라우드 동기화 중...", "#2ecc71");

            if (currentView === 'blogs') {
                for (let cb of checked) {
                    dbData.deleted_blogs[cb.value] = true;
                    await updateFirebase(`deleted_blogs/${cb.value}`, true);
                }
                renderBlogList();
            } else if (currentView === 'posts' && currentBlogId) {
                if (!dbData.deleted_posts[currentBlogId]) dbData.deleted_posts[currentBlogId] = {};
                for (let cb of checked) {
                    dbData.deleted_posts[currentBlogId][cb.value] = true;
                    await updateFirebase(`deleted_posts/${currentBlogId}/${cb.value}`, true);
                }
                renderPostList(currentBlogId);
            }
            setStatus("synced", "#2ecc71");
        }

        // ── 히스토리 기반 화면 이동 (브라우저 뒤로/앞으로 버튼 지원) ──
        // 각 화면을 히스토리 항목으로 저장 → 뒤로/앞으로가 화면 이동으로 동작.
        function applyState(s) {
            isEditMode = false; // 화면 이동 시 편집 모드 해제
            const screen = s && s.screen;
            if (screen === 'posts') renderPostList(s.blogId);
            else if (screen === 'reader') loadContent(s.blogId, s.postId);
            else renderBlogList();
        }

        // 화면 안 ‹ 버튼: 브라우저 뒤로가기와 동일하게 동작
        function goBack() { history.back(); }

        window.addEventListener('popstate', function (e) {
            // 본문 편집 중이면 편집만 닫고 현재 화면 유지(미저장 내용 보호)
            const editing = currentView === 'reader' &&
                document.getElementById('content-save-btn').style.display !== 'none';
            if (editing) {
                cancelContentEdit();
                history.pushState({ screen: 'reader', blogId: currentBlogId, postId: currentContentId }, '');
                return;
            }
            const s = e.state;
            if (!s || s.guard) {
                // 첫 화면 아래(앱 밖)로 가려 함 → 막고 첫 화면 유지
                isEditMode = false;
                renderBlogList();
                history.pushState({ screen: 'blogs' }, '');
            } else {
                applyState(s);
            }
        });

        // ponytail self-check: 읽기 스타일 주입 위치 + 정렬 + override 우선순위를 1회 검증(실패 시에만 콘솔 경고)
        (function () {
            const withHead = injectReadingStyle("<html><head><meta charset='utf-8'></head><body>x</body></html>");
            console.assert(/<head[^>]*>\s*<style id='reader-base'/i.test(withHead), "injectReadingStyle: <head> 케이스 위치 오류");
            const fragment = injectReadingStyle("<p>조각</p>");
            console.assert(fragment.indexOf("reader-base") !== -1, "injectReadingStyle: fragment 케이스 누락");
            // 정렬 검증
            console.assert(["100","20","3"].sort((a,b)=>compareId(b,a)).join() === "100,20,3", "compareId: 숫자 내림차순 오류");
            console.assert(["b","a","c"].sort((a,b)=>compareId(a,b)).join() === "a,b,c", "compareId: 문자 오름차순 오류");
            // override 우선순위 검증
            console.assert(getBlogName({ id: "__t", name: "base" }) === "base", "getBlogName: override 없을 때 원본 사용");
            dbData.blog_name_overrides["__t"] = "수정";
            console.assert(getBlogName({ id: "__t", name: "base" }) === "수정", "getBlogName: override 있을 때 우선");
            delete dbData.blog_name_overrides["__t"];
            console.assert(getPostTitle("__b", { id: "__p", title: "원제목" }) === "원제목", "getPostTitle: override 없을 때 원본 사용");
        })();
    </script>
</body>
</html>
